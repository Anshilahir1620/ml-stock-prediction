<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>

  <!-- Grid lines (subtle) -->
  <line x1="8" y1="48" x2="56" y2="48" stroke="#1e293b" stroke-width="1"/>
  <line x1="8" y1="36" x2="56" y2="36" stroke="#1e293b" stroke-width="1"/>
  <line x1="8" y1="24" x2="56" y2="24" stroke="#1e293b" stroke-width="1"/>

  <!-- Candlestick bars (background) -->
  <rect x="10" y="38" width="5" height="10" rx="1.5" fill="#334155"/>
  <rect x="18" y="32" width="5" height="16" rx="1.5" fill="#334155"/>

  <!-- Trending up line chart (emerald glow) -->
  <polyline
    points="8,46 16,40 24,42 32,30 40,24 48,18 56,12"
    fill="none"
    stroke="#10b981"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Glow effect on line -->
  <polyline
    points="8,46 16,40 24,42 32,30 40,24 48,18 56,12"
    fill="none"
    stroke="#34d399"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.5"
  />

  <!-- AI node dot at tip -->
  <circle cx="56" cy="12" r="4" fill="#10b981"/>
  <circle cx="56" cy="12" r="2" fill="#ecfdf5"/>

  <!-- Neural node connections (small) -->
  <circle cx="32" cy="30" r="2.5" fill="#10b981" opacity="0.8"/>
  <circle cx="16" cy="40" r="2" fill="#10b981" opacity="0.6"/>
</svg>
